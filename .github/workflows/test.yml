name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install bats + shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck tmux

      - name: install bats + shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck tmux

      - name: install uv
        uses: astral-sh/setup-uv@v3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install pytest
        run: uv tool install pytest

      - name: shellcheck
        run: shellcheck setup/*.sh plugins/ios-dev/skills/_lib/*.sh

      - name: bats
        run: bats tests/bats/

      - name: pytest
        run: uv tool run pytest tests/pytest/ -q

      - name: pytest (second-wind)
        run: uv tool run pytest tools/second-wind/tests/ -q
