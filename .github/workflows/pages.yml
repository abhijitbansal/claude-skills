name: pages

# Deploys the public site (site/index.html) + companion docs to GitHub Pages.
# DORMANT until the repo is public AND Pages is enabled (Settings ▸ Pages ▸ Source: GitHub Actions).
# Triggers only on a published release, or manually — never on plain pushes.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight release deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Flatten site/ + docs/ into one published root and rewrite the
      # cross-links (which use ../docs and ../site for *local* viewing) so they
      # resolve on the deployed flat site. Shared assets land at /assets/;
      # feature pages keep a /features/ subdir; the Second Wind CLI guide keeps
      # its /second-wind/ path (referenced by name in wind.py + tests).
      - name: Stage site
        run: |
          mkdir -p _site _site/features _site/second-wind
          cp site/index.html _site/index.html
          cp site/og.png _site/og.png
          cp -r site/assets _site/assets
          cp docs/*.html _site/ 2>/dev/null || true
          cp docs/features/*.html _site/features/ 2>/dev/null || true
          cp docs/second-wind/index.html _site/second-wind/index.html 2>/dev/null || true
          # local link forms -> flat deployed forms (applied to every page):
          #   ../docs/<path>        -> <path>          (landing into docs/)
          #   ../site/index.html    -> index.html      (any page back to landing)
          #   ../site/assets/<f>    -> assets/<f>       (shared css/js; leading ../ preserved in subdirs)
          find _site -name '*.html' -print0 | xargs -0 sed -i \
            -e 's#\.\./docs/##g' \
            -e 's#\.\./site/index.html#index.html#g' \
            -e 's#\.\./site/assets/#assets/#g'

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
