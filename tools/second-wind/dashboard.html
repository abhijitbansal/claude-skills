<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="data:,">
<title>second wind — dashboard</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg-deep: #070a0f;
    --bg-raised: #11161f;
    --bg-card: #151b26;
    --bg-pre: #0c1118;
    --border: #232c3b;
    --border-soft: #1b2330;
    --text: #d7dee9;
    --text-dim: #8b97a8;
    --text-faint: #5c6878;
    --cyan: #22d3ee;
    --cyan-soft: #4dd8e6;
    --cyan-dim: #2a8f9a;
    --amber: #f59e0b;
    --amber-soft: #f5b85c;
    --green: #34d399;
    --red: #f87171;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1100px 480px at 75% -180px, rgba(34, 211, 238, .07), transparent 65%),
      radial-gradient(900px 420px at 10% -160px, rgba(245, 158, 11, .05), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 20px 64px;
  }

  /* ---------- offline banner ---------- */
  #offline {
    display: none;
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(90deg, rgba(248, 113, 113, .16), rgba(248, 113, 113, .08));
    border-bottom: 1px solid rgba(248, 113, 113, .45);
    color: #fca5a5;
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 20px;
    text-align: center;
    backdrop-filter: blur(6px);
  }
  #offline.show { display: block; }
  #offline code {
    background: rgba(248, 113, 113, .14);
    border: 1px solid rgba(248, 113, 113, .3);
    border-radius: 5px;
    padding: 1px 7px;
    color: #fecaca;
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px 16px;
    padding: 34px 0 8px;
  }
  .wordmark {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin: 0;
    background: linear-gradient(100deg, #e8eef7 25%, var(--cyan) 70%, var(--amber-soft) 105%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .wordmark .glyphs {
    -webkit-text-fill-color: var(--amber);
    font-size: 20px;
    letter-spacing: 0;
    margin-right: 2px;
  }
  .tagline {
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .04em;
  }

  /* ---------- watcher banner ---------- */
  #watcher {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px 18px;
    margin: 18px 0 30px;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    background: linear-gradient(160deg, var(--bg-card), var(--bg-raised));
    transition: border-color .35s, box-shadow .35s;
  }
  #watcher.hot {
    border-color: rgba(245, 158, 11, .5);
    box-shadow: 0 0 0 1px rgba(245, 158, 11, .12),
                0 8px 30px -16px rgba(245, 158, 11, .35);
  }
  #watcher-text {
    flex: 1 1 260px;
    min-width: 0;
    font-family: var(--mono);
    font-size: 13.5px;
    color: var(--text-faint);
    overflow-wrap: anywhere;
  }
  #watcher.hot #watcher-text { color: var(--amber-soft); }
  #watcher-text .count { color: var(--amber); font-weight: 700; }
  #watcher-text .dot {
    display: inline-block;
    margin-right: 9px;
    color: var(--text-faint);
  }
  #watcher.hot #watcher-text .dot {
    color: var(--amber);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .35; }
  }

  /* ---------- buttons ---------- */
  button {
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: .02em;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    color: var(--text-dim);
    transition: color .15s, border-color .15s, background .15s, transform .06s;
  }
  button:hover { color: var(--text); border-color: var(--text-faint); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: .45; cursor: default; transform: none; }
  .btn-resume {
    color: #062a31;
    background: linear-gradient(120deg, var(--cyan), var(--cyan-soft));
    border-color: transparent;
  }
  .btn-resume:hover {
    color: #03191e;
    border-color: transparent;
    background: linear-gradient(120deg, #3fe0f7, #6ee2ef);
  }
  .btn-kill {
    color: var(--red);
    border-color: rgba(248, 113, 113, .35);
    background: rgba(248, 113, 113, .06);
  }
  .btn-kill:hover {
    color: #fecaca;
    border-color: rgba(248, 113, 113, .6);
    background: rgba(248, 113, 113, .14);
  }

  /* ---------- session grid ---------- */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
    gap: 18px;
  }
  #empty {
    display: none;
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 13px;
    padding: 56px 16px;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
  #empty.show { display: block; }

  .card {
    display: flex;
    flex-direction: column;
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: linear-gradient(165deg, var(--bg-card), var(--bg-raised) 80%);
    overflow: hidden;
    transition: border-color .25s, box-shadow .25s;
  }
  .card:hover {
    border-color: #2e3a4e;
    box-shadow: 0 14px 38px -22px rgba(0, 0, 0, .9);
  }
  .card-head {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 12px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border-soft);
    background: linear-gradient(90deg, rgba(34, 211, 238, .05), transparent 60%);
  }
  .sess-name {
    flex: 1 1 140px;
    min-width: 0;
    font-family: var(--mono);
    font-size: 14.5px;
    font-weight: 700;
    color: var(--cyan-soft);
    overflow-wrap: anywhere;
  }
  .pill {
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: .03em;
    padding: 3px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-faint);
    background: rgba(92, 104, 120, .08);
    white-space: nowrap;
    transition: color .25s, border-color .25s, background .25s;
  }
  .pill[data-state="running"] {
    color: var(--green);
    border-color: rgba(52, 211, 153, .4);
    background: rgba(52, 211, 153, .08);
  }
  .pill[data-state="waiting-for-reset"] {
    color: var(--amber-soft);
    border-color: rgba(245, 158, 11, .45);
    background: rgba(245, 158, 11, .08);
  }
  .pill[data-state="starting"] {
    color: var(--cyan-soft);
    border-color: rgba(34, 211, 238, .4);
    background: rgba(34, 211, 238, .08);
  }
  .pill[data-state="not running"] {
    color: var(--red);
    border-color: rgba(248, 113, 113, .4);
    background: rgba(248, 113, 113, .07);
  }
  .reset-line {
    display: none;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--amber-soft);
    padding: 8px 16px 0;
    overflow-wrap: anywhere;
  }
  .reset-line.show { display: block; }
  .reset-line .glyph { color: var(--amber); margin-right: 7px; }

  .pane {
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.55;
    color: #b8c4d4;
    background: var(--bg-pre);
    border: 1px solid var(--border-soft);
    border-radius: 9px;
    margin: 12px 16px 0;
    padding: 10px 12px;
    height: 220px;
    overflow: auto;
    white-space: pre;
    overscroll-behavior: contain;
  }
  .pane:empty::before {
    content: "no pane output";
    color: var(--text-faint);
    font-style: italic;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
  }
  .send-input {
    flex: 1 1 60px;
    min-width: 0;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
    background: var(--bg-pre);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .send-input::placeholder { color: var(--text-faint); }
  .send-input:focus {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 0 2px rgba(34, 211, 238, .12);
  }

  /* ---------- toast ---------- */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%) translateY(16px);
    max-width: min(92vw, 480px);
    padding: 9px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    z-index: 60;
    overflow-wrap: anywhere;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { color: var(--green); border-color: rgba(52, 211, 153, .4); }
  #toast.err { color: var(--red); border-color: rgba(248, 113, 113, .4); }

  footer {
    margin-top: 44px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-faint);
  }
  footer .cy { color: var(--cyan-dim); }

  @media (max-width: 480px) {
    body { font-size: 14px; }
    .wordmark { font-size: 22px; }
    .pane { height: 180px; margin: 10px 12px 0; }
    .card-head { padding: 12px 12px 9px; }
    .reset-line { padding: 8px 12px 0; }
    .card-actions { padding: 10px 12px 14px; }
    #watcher { padding: 12px 14px; }
  }
</style>
</head>
<body>
<div id="offline" role="alert">
  dashboard server stopped — restart with <code>wind dash</code>
</div>

<div class="wrap">
  <header>
    <h1 class="wordmark"><span class="glyphs">◢◤</span> second wind</h1>
    <span class="tagline">live session dashboard</span>
  </header>

  <div id="watcher">
    <div id="watcher-text"><span class="dot">●</span><span id="watcher-msg">watcher idle / no limit detected</span></div>
    <button id="resume-all" class="btn-resume" type="button">↻ resume all</button>
  </div>

  <main id="grid">
    <div id="empty">no sessions configured — add repos to your wind config and run <strong>wind up</strong></div>
  </main>

  <footer>polls <span class="cy">/api/status</span> every 3s · 127.0.0.1 only</footer>
</div>

<div id="toast" role="status"></div>

<script>
"use strict";

const TOKEN = "{{TOKEN}}";
const POLL_MS = 3000;
const TICK_MS = 1000;
const PIN_SLACK_PX = 8;

const STATE_GLYPHS = {
  "running": "●",
  "waiting-for-reset": "◌",
  "idle": "○",
  "starting": "◍",
  "not running": "✗",
};

const els = {
  offline: document.getElementById("offline"),
  watcher: document.getElementById("watcher"),
  watcherMsg: document.getElementById("watcher-msg"),
  resumeAll: document.getElementById("resume-all"),
  grid: document.getElementById("grid"),
  empty: document.getElementById("empty"),
  toast: document.getElementById("toast"),
};

// name -> { root, pill, resetLine, pane, input, sendBtn, killBtn, pinned }
const cards = new Map();
let latest = { watcher: {}, sessions: [] };
let toastTimer = null;

function showToast(msg, kind) {
  els.toast.textContent = msg;
  els.toast.className = "show" + (kind ? " " + kind : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { els.toast.className = ""; }, 2600);
}

function fmtCountdown(seconds) {
  if (!isFinite(seconds) || seconds <= 0) return "now";
  const s = Math.floor(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return h + "h " + m + "m " + (sec < 10 ? "0" : "") + sec + "s";
  if (m > 0) return m + "m " + (sec < 10 ? "0" : "") + sec + "s";
  return sec + "s";
}

function fmtLocalTime(epoch) {
  return new Date(epoch * 1000).toLocaleTimeString([], {
    hour: "2-digit", minute: "2-digit",
  });
}

async function apiPost(path, body) {
  const res = await fetch(path, {
    method: "POST",
    headers: {
      "X-Wind-Token": TOKEN,
      "Content-Type": "application/json",
    },
    body: JSON.stringify(body || {}),
  });
  let data = null;
  try { data = await res.json(); } catch (e) { /* non-JSON error body */ }
  if (!res.ok) {
    const reason = (data && data.error) ? data.error : ("HTTP " + res.status);
    throw new Error(reason);
  }
  return data;
}

function buildCard(name) {
  const root = document.createElement("section");
  root.className = "card";

  const head = document.createElement("div");
  head.className = "card-head";
  const title = document.createElement("span");
  title.className = "sess-name";
  title.textContent = name;
  const pill = document.createElement("span");
  pill.className = "pill";
  head.appendChild(title);
  head.appendChild(pill);

  const resetLine = document.createElement("div");
  resetLine.className = "reset-line";
  const resetGlyph = document.createElement("span");
  resetGlyph.className = "glyph";
  resetGlyph.textContent = "◌";
  const resetText = document.createElement("span");
  resetLine.appendChild(resetGlyph);
  resetLine.appendChild(resetText);

  const pane = document.createElement("pre");
  pane.className = "pane";

  const card = {
    root, pill, resetLine, resetText, pane,
    pinned: true, resetAt: null,
  };
  pane.addEventListener("scroll", () => {
    card.pinned = pane.scrollTop + pane.clientHeight >=
                  pane.scrollHeight - PIN_SLACK_PX;
  });

  const actions = document.createElement("div");
  actions.className = "card-actions";
  const input = document.createElement("input");
  input.className = "send-input";
  input.type = "text";
  input.placeholder = "send text to " + name + "…";
  input.setAttribute("aria-label", "text to send to " + name);
  const sendBtn = document.createElement("button");
  sendBtn.type = "button";
  sendBtn.textContent = "send";
  const killBtn = document.createElement("button");
  killBtn.type = "button";
  killBtn.className = "btn-kill";
  killBtn.textContent = "kill";

  const doSend = async () => {
    const text = input.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    try {
      await apiPost("/api/send", { session: name, text });
      input.value = "";
      showToast("sent to " + name, "ok");
    } catch (err) {
      showToast("send failed: " + err.message, "err");
    } finally {
      sendBtn.disabled = false;
    }
  };
  sendBtn.addEventListener("click", doSend);
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") doSend();
  });

  killBtn.addEventListener("click", async () => {
    const ok = confirm("Kill " + name +
      "? The tmux session and anything unsaved in it dies.");
    if (!ok) return;
    killBtn.disabled = true;
    try {
      await apiPost("/api/kill", { session: name });
      showToast("killed " + name, "ok");
      refresh();
    } catch (err) {
      showToast("kill failed: " + err.message, "err");
    } finally {
      killBtn.disabled = false;
    }
  });

  actions.appendChild(input);
  actions.appendChild(sendBtn);
  actions.appendChild(killBtn);

  root.appendChild(head);
  root.appendChild(resetLine);
  root.appendChild(pane);
  root.appendChild(actions);
  return card;
}

function updateCard(card, sess) {
  const glyph = STATE_GLYPHS[sess.state] || "○";
  card.pill.textContent = glyph + " " + sess.state;
  card.pill.dataset.state = sess.state;
  card.resetAt = (typeof sess.reset_at === "number") ? sess.reset_at : null;

  // pane_tail is untrusted LLM output — textContent only, never innerHTML.
  if (card.pane.textContent !== sess.pane_tail) {
    card.pane.textContent = sess.pane_tail || "";
    if (card.pinned) card.pane.scrollTop = card.pane.scrollHeight;
  }
  renderCardCountdown(card, sess.reset_human || "");
}

function renderCardCountdown(card, resetHuman) {
  if (card.resetAt) {
    const at = resetHuman ? resetHuman.split(" · ")[0]
                          : fmtLocalTime(card.resetAt);
    const remain = card.resetAt - Date.now() / 1000;
    card.resetText.textContent =
      "resets " + at + " · in " + fmtCountdown(remain);
    card.lastResetHuman = resetHuman;
    card.resetLine.classList.add("show");
  } else {
    card.resetLine.classList.remove("show");
  }
}

function renderWatcher() {
  const w = latest.watcher || {};
  if (typeof w.resume_at === "number") {
    const remain = w.resume_at - Date.now() / 1000;
    els.watcher.classList.add("hot");
    els.watcherMsg.textContent = "limit hit · resuming all at " +
      fmtLocalTime(w.resume_at) + " · in ";
    const count = document.createElement("span");
    count.className = "count";
    count.textContent = fmtCountdown(remain);
    els.watcherMsg.appendChild(count);
  } else {
    els.watcher.classList.remove("hot");
    els.watcherMsg.textContent = "watcher idle / no limit detected";
  }
}

function render() {
  const sessions = latest.sessions || [];
  els.empty.classList.toggle("show", sessions.length === 0);

  const seen = new Set();
  for (const sess of sessions) {
    seen.add(sess.name);
    let card = cards.get(sess.name);
    if (!card) {
      card = buildCard(sess.name);
      cards.set(sess.name, card);
      els.grid.appendChild(card.root);
    }
    updateCard(card, sess);
  }
  for (const [name, card] of cards) {
    if (!seen.has(name)) {
      card.root.remove();
      cards.delete(name);
    }
  }
  renderWatcher();
}

async function refresh() {
  try {
    const res = await fetch("/api/status", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    latest = await res.json();
    els.offline.classList.remove("show");
    render();
  } catch (err) {
    els.offline.classList.add("show");
  }
}

function tick() {
  // between polls, keep visible countdowns moving every second
  renderWatcher();
  for (const card of cards.values()) {
    renderCardCountdown(card, card.lastResetHuman || "");
  }
}

els.resumeAll.addEventListener("click", async () => {
  els.resumeAll.disabled = true;
  try {
    const data = await apiPost("/api/resume", {});
    const n = data && typeof data.resumed === "number" ? data.resumed : 0;
    showToast("resume sent to " + n + " session(s)", "ok");
    refresh();
  } catch (err) {
    showToast("resume failed: " + err.message, "err");
  } finally {
    els.resumeAll.disabled = false;
  }
});

refresh();
setInterval(refresh, POLL_MS);
setInterval(tick, TICK_MS);
</script>
</body>
</html>
